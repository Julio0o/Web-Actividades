<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario — Servicios</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">▣</span>
        <span class="brand-name">STOCKR</span>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">Servicios</a>
        <a href="alta.html" class="btn-alta">+ Nuevo Producto</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <section class="page-hero">
      <p class="hero-label">// catálogo activo</p>
      <h1 class="hero-title">Productos<br><span class="hero-accent">en Stock</span></h1>
      <p class="hero-sub">Gestiona tu inventario con precisión y velocidad.</p>
    </section>

    <div class="toolbar">
      <div class="count-badge">
        <span id="product-count">0</span> productos registrados
      </div>
      <input
        id="search-input"
        class="search-input"
        type="text"
        placeholder="Buscar producto..."
        aria-label="Buscar producto"
      >
    </div>

    <div id="empty-state" class="empty-state hidden">
      <span class="empty-icon">📦</span>
      <p>No hay productos aún.</p>
      <a href="alta.html" class="btn-alta">Agregar el primero</a>
    </div>

    <div id="product-grid" class="product-grid"></div>
  </main>

  <footer class="site-footer">
    <p>STOCKR &copy; 2025 — Solo HTML, CSS y JavaScript vanilla</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
